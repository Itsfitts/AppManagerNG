# SPDX-License-Identifier: GPL-3.0-or-later
# Triggered by a vX.Y.Z tag push.
# Builds a signed release APK twice from a clean tree, compares the binary hashes,
# creates a GitHub Release, and uploads the verified APK plus SHA-256 sidecar,
# SBOM, and GitHub artifact attestations.
#
# Required GitHub Secrets:
#   SIGNING_KEYSTORE_BASE64  — base64-encoded AppManagerNG-release.jks
#   SIGNING_STORE_PASSWORD   — keystore store password
#   SIGNING_KEY_ALIAS        — key alias (release)
#   SIGNING_KEY_PASSWORD     — key password

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-release:
    name: Build & publish release APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle', '**/versions.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Extract tag version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 --decode > app/AppManagerNG-release.jks

      - name: Write keystore.properties
        run: |
          cat > app/keystore.properties <<PROPS
          storeFile=AppManagerNG-release.jks
          storePassword=${{ secrets.SIGNING_STORE_PASSWORD }}
          keyAlias=${{ secrets.SIGNING_KEY_ALIAS }}
          keyPassword=${{ secrets.SIGNING_KEY_PASSWORD }}
          PROPS
          sed -i 's/^[[:space:]]*//' app/keystore.properties

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Verify reproducible release APK
        run: bash scripts/verify_reproducible_release.sh

      - name: Locate APK artifacts
        id: apks
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PUBLISH_DIR="build/reproducible-release/publish"
          ASSET_LIST="build/reproducible-release/github-release-assets.txt"
          RELEASE_ASSET_DIR="app/build/outputs/apk/release"
          : > "$ASSET_LIST"
          mkdir -p "$RELEASE_ASSET_DIR"
          shopt -s nullglob
          APK_COUNT=0
          for SRC in "$PUBLISH_DIR"/*.apk; do
            FILE="$(basename "$SRC")"
            DEST_NAME="$(printf '%s' "$FILE" | sed "s/^AppManagerNG-reproducible/AppManagerNG-${VERSION}/")"
            DEST="$RELEASE_ASSET_DIR/$DEST_NAME"
            CHECKSUM="${DEST}.sha256"
            cp "$SRC" "$DEST"
            HASH="$(sha256sum "$DEST" | awk '{print $1}')"
            printf '%s  %s\n' "$HASH" "$(basename "$DEST")" > "$CHECKSUM"
            printf '%s\n%s\n' "$DEST" "$CHECKSUM" >> "$ASSET_LIST"
            APK_COUNT=$((APK_COUNT + 1))
          done
          if (( APK_COUNT == 0 )); then
            echo "::error::No reproducible APK artifacts were found in $PUBLISH_DIR" >&2
            exit 1
          fi
          SBOM_COUNT=0
          for SRC in "$PUBLISH_DIR"/*.cdx.json; do
            FILE="$(basename "$SRC")"
            DEST_NAME="$(printf '%s' "$FILE" | sed "s/^AppManagerNG-reproducible/AppManagerNG-${VERSION}/")"
            DEST="$RELEASE_ASSET_DIR/$DEST_NAME"
            cp "$SRC" "$DEST"
            printf '%s\n' "$DEST" >> "$ASSET_LIST"
            SBOM_COUNT=$((SBOM_COUNT + 1))
          done
          if (( SBOM_COUNT == 0 )); then
            echo "::error::No CycloneDX SBOM artifact was found in $PUBLISH_DIR" >&2
            exit 1
          fi
          echo "ASSET_LIST=$ASSET_LIST" >> "$GITHUB_OUTPUT"

      - name: Report APK sizes
        env:
          APK_SIZE_LIMIT_BYTES: ${{ vars.APK_SIZE_LIMIT_BYTES }}
        run: |
          LIMIT_BYTES="${APK_SIZE_LIMIT_BYTES:-31457280}"
          RELEASE_ASSET_DIR="app/build/outputs/apk/release"
          echo "### APK sizes" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| APK | Size | Limit | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | ---: | ---: | --- |" >> "$GITHUB_STEP_SUMMARY"
          FAIL=0
          shopt -s nullglob
          for APK in "$RELEASE_ASSET_DIR"/*.apk; do
            SIZE_BYTES="$(stat -c%s "$APK")"
            SIZE_MIB="$(awk "BEGIN { printf \"%.2f MiB\", $SIZE_BYTES / 1048576 }")"
            LIMIT_MIB="$(awk "BEGIN { printf \"%.2f MiB\", $LIMIT_BYTES / 1048576 }")"
            STATUS="OK"
            if (( SIZE_BYTES > LIMIT_BYTES )); then
              STATUS="Over limit"
              FAIL=1
            fi
            echo "| $(basename "$APK") | $SIZE_MIB | $LIMIT_MIB | $STATUS |" >> "$GITHUB_STEP_SUMMARY"
          done
          if (( FAIL != 0 )); then
            echo "::error::One or more APKs exceed APK_SIZE_LIMIT_BYTES=$LIMIT_BYTES" >&2
            exit 1
          fi

      - name: Attest APK provenance
        uses: actions/attest@v4
        with:
          subject-path: app/build/outputs/apk/release/*.apk

      - name: Attest APK SBOM
        uses: actions/attest@v4
        with:
          subject-path: app/build/outputs/apk/release/*.apk
          sbom-path: app/build/outputs/apk/release/AppManagerNG-${{ steps.version.outputs.VERSION }}.cdx.json

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t ASSETS < "${{ steps.apks.outputs.ASSET_LIST }}"
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" "${ASSETS[@]}" --clobber
          else
            gh release create "${{ github.ref_name }}" \
              --title "AppManagerNG ${{ github.ref_name }}" \
              --generate-notes \
              "${ASSETS[@]}"
          fi
