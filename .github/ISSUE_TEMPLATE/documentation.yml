name: Docs improvement
description: Improve AppManagerNG documentation — README, ROADMAP, advisories, audits, or in-app strings
labels: [Documentation]

body:
  - type: checkboxes
    attributes:
       label: Please check before submitting
       options:
          - label: I have read the relevant section of [`README.md`](https://github.com/SysAdminDoc/AppManagerNG/blob/main/README.md), [`ROADMAP.md`](https://github.com/SysAdminDoc/AppManagerNG/blob/main/ROADMAP.md), [`CONTRIBUTING.md`](https://github.com/SysAdminDoc/AppManagerNG/blob/main/CONTRIBUTING.md), or the targeted doc under `docs/`.
            required: true
          - label: I have checked that the issue is in the AppManagerNG fork, not the upstream App Manager documentation hosted at [muntashir.dev/AppManager](https://muntashir.dev/AppManager/).
            required: true

  - type: textarea
    attributes:
        label: Document or section
        description: Path or URL of the document (e.g., `docs/sideload-verification.md`, the `Premium Polish Track` section of `ROADMAP.md`, a specific in-app string).
    validations:
        required: true

  - type: textarea
    attributes:
        label: What is wrong, missing, or unclear
        description: Quote the existing text or paste a screenshot so the maintainer sees the same view you do.
    validations:
        required: true

  - type: textarea
    attributes:
        label: Suggested change
        description: A clear, concise rewrite or addition. If it touches multiple sections, list them.
    validations:
        required: true

  - type: textarea
    attributes:
        label: Additional context
        description: Anything else helpful — references, screenshots, or related issues.
