name: Feature request
description: Suggest a feature, capability, or workflow for AppManagerNG
labels: [Feature]

body:
  - type: checkboxes
    attributes:
       label: Please check before submitting
       description: A few checks that keep the roadmap conversation focused.
       options:
          - label: I have read [`CONTRIBUTING.md`](https://github.com/SysAdminDoc/AppManagerNG/blob/main/CONTRIBUTING.md) and the relevant sections of the [`ROADMAP.md`](https://github.com/SysAdminDoc/AppManagerNG/blob/main/ROADMAP.md).
            required: true
          - label: I have searched [open and closed issues](https://github.com/SysAdminDoc/AppManagerNG/issues?q=is%3Aissue) and the roadmap for an existing request covering this idea.
            required: true
          - label: I am running the latest AppManagerNG release and this feature is not already shipped under another name.
            required: true

  - type: textarea
    attributes:
        label: Describe the problem the feature solves
        description: What user pain point or workflow gap is this trying to address? Concrete user stories help more than abstract capability lists.
    validations:
        required: true

  - type: textarea
    attributes:
        label: Describe the solution you'd like
        description: A clear and concise description of the proposed feature. Surface areas (which screen, which menu, which intent), inputs, and outputs.

  - type: textarea
    attributes:
        label: Describe alternatives you've considered
        description: Existing AppManagerNG features that come close, other apps that solve this differently, or workarounds you currently use.

  - type: textarea
    attributes:
        label: Fit with AppManagerNG constraints
        description: |
          AppManagerNG keeps the product offline-by-default, root/Shizuku/ADB-first, and minSdk 21. Briefly note how this feature aligns with those constraints, or where it would push against them (network calls, cloud services, minSdk bump, telemetry).

  - type: textarea
    attributes:
        label: Additional context
        description: Screenshots, mockups, or links to related issues / external references.
