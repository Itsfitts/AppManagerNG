name: Help wanted
description: Ask for help understanding an existing AppManagerNG feature or workflow
labels: [Help Wanted]

body:
  - type: checkboxes
    attributes:
      label: Please check before submitting
      description: Help-wanted issues are for clarifying an existing feature. Use the Bug report template if the feature is malfunctioning, or the Feature request template if you want something new.
      options:
        - label: I have searched [open and closed issues](https://github.com/SysAdminDoc/AppManagerNG/issues?q=is%3Aissue) and could not find a relevant answer.
          required: true
        - label: I have read the relevant section of [`README.md`](https://github.com/SysAdminDoc/AppManagerNG/blob/main/README.md), [`CONTRIBUTING.md`](https://github.com/SysAdminDoc/AppManagerNG/blob/main/CONTRIBUTING.md), or any linked doc under `docs/`.
          required: true

  - type: textarea
    attributes:
        label: Which feature or workflow
        description: A short description of the AppManagerNG feature you're trying to use — e.g., "encrypted backup with AES", "freezing a system app via Shizuku".
    validations:
        required: true

  - type: textarea
    attributes:
        label: What did you try, and what happened
        description: The sequence of steps, the result you got, and the result you expected. If a privilege mode is involved, include which one.

  - type: textarea
    attributes:
        label: Device + mode (optional)
        description: Only fill in if the question depends on device or mode behavior.
        value: |
          - AppManagerNG version:
          - Active mode: Auto / Root / Shizuku / ADB-WiFi / ADB-USB / No-root
          - Privilege provider: Magisk / KernelSU / APatch / Shizuku / Sui / ZygiskNext / None
          - Manufacturer + model:
          - Android version + API level:

  - type: textarea
    attributes:
        label: Additional context
        description: Screenshots, recordings, or links to related discussions.
